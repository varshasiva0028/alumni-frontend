<div class="jumbtron card m-5">
    <div class="container-fluid">
        <form [formGroup]="fglog" class="m-1 border-bottom">
            <br>
            <div class="form-group row ">
                <div class="col text-center">
                    <h5>Login</h5>
                </div>

            </div>
            <div class="form-group row ">
                <div class="col-sm m-1">
                    <input class="form-control" type="email" formControlName="lemail" placeholder="Name" required>
                </div>
                <div class="col-sm m-1">
                    <input class="form-control" type="password" formControlName="lpass" placeholder="PIN" (ng-keypress)="sign()" required>

                </div>
                <div class="col text-center m-1">
                    <button class=" btn btn-outline-success rounded-pills " type="submit" (click)="sign()">
                        <svg style="width: 24px;height: 24px" viewBox="0 0 512 512">
                            <path d="M376 186h-20v-40c0-55-45-100-100-100S156 91 156 146h37.998c0-34.004 28.003-62.002 62.002-62.002 34.004 0 62.002 27.998 62.002 62.002H318v40H136c-22.002 0-40 17.998-40 40v200c0 22.002 17.998 40 40 40h240c22.002 0 40-17.998 40-40V226c0-22.002-17.998-40-40-40zM256 368c-22.002 0-40-17.998-40-40s17.998-40 40-40 40 17.998 40 40-17.998 40-40 40z"
                            />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="col text-danger text-center">
                <label >{{lshow}}</label>
            </div>
        </form>
    </div>
</div>
