<div class="container-fluid py-4">

    <!-- ================= FIXED HEADER ================= -->

    <div class="position-fixed top-0 end-0 bg-white border-bottom shadow-sm"
        style="left:240px; width:calc(100% - 240px); z-index:1040;">

        <div class="container-fluid px-4 py-3">

            <h2 class="fw-bold mb-1 ">
                Institution Gallery
            </h2>

            <p class="text-secondary mb-0">
                Browse all institution events and memories
            </p>

        </div>

    </div>

    <!-- Header Spacer -->
    <div style="height:40px;"></div>

    <!-- ================= GALLERY ================= -->

    <div class="row g-4">

        <div class="col-xl-3 col-lg-4 col-md-6"
            *ngFor="let event of (galleryEvents$ | async)">

            <div class="card border-0 shadow-sm rounded-4 overflow-hidden h-100 hover-card-lift cursor-pointer"
                (click)="openGallery(event)">

                <div class="position-relative">

                    <img [src]="event.thumbnail"
                        class="card-img-top"
                        style="height:220px; object-fit:cover;">

                    <!-- Visibility -->

                    <button
                        class="btn btn-sm rounded-circle position-absolute top-0 start-0 m-2 shadow-sm"
                        [ngClass]="event.visible ? 'btn-success' : 'btn-danger'"
                        style="width:38px;height:38px;"
                        (click)="toggleVisibility(event); $event.stopPropagation()">

                        <i class="bi"
                            [ngClass]="event.visible ? 'bi-eye-fill' : 'bi-eye-slash-fill'">
                        </i>

                    </button>

                    <!-- Edit -->

                    <button
                        class="btn btn-light btn-sm rounded-circle shadow-sm position-absolute top-0 end-0 m-2"
                        style="width:38px;height:38px;"
                        (click)="editEvent(event); $event.stopPropagation()">

                        <i class="bi bi-pencil-fill"></i>

                    </button>

                    <!-- Photo Count -->

                    <span class="badge bg-info position-absolute"
                        style="bottom:10px;right:10px;">

                        <i class="bi bi-images me-1"></i>

                        {{ event.totalPhotos }}

                    </span>

                </div>

                <div class="card-body">

                    <h5 class="fw-bold mb-2">
                        {{ event.title }}
                    </h5>

                    <p class="text-secondary small mb-0">
                        {{ event.quote }}
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- ================= FLOATING ADD BUTTON ================= -->

<button
    class="btn btn-success rounded-circle shadow-lg position-fixed"
    style="width:65px;height:65px;right:30px;bottom:30px;z-index:1055;"
    (click)="addNewEvent()">

    <i class="bi bi-plus-lg fs-2"></i>

</button>
