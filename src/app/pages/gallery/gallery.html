<div class="container-fluid py-4">

    <!-- ================= HEADER ================= -->

    <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-body d-flex justify-content-between align-items-center flex-wrap">

            <div>
                <h2 class="fw-bold mb-1">
                    Institution Gallery
                </h2>

                <p class="text-secondary mb-0">
                    Browse all institution events and memories
                </p>
            </div>

            <button
                class="btn btn-success rounded-circle shadow"
                style="width:55px;height:55px"
                (click)="addNewEvent()">

                <i class="bi bi-plus-lg fs-3"></i>

            </button>
        </div>
    </div>
    <!-- ================= GALLERY CARDS ================= -->
    <div class="row g-4">
        <div
            class="col-xl-3 col-lg-4 col-md-6"
            *ngFor="let event of galleryEvents">
            <div
                class="card border-0 shadow-sm rounded-4 overflow-hidden h-100 hover-card-lift">
                <!-- Thumbnail -->
                <img
                    [src]="event.thumbnail"
                    class="card-img-top"
                    style="height:220px;object-fit:cover"
                    [alt]="event.title">
                <!-- Body -->
                <div class="card-body d-flex flex-column">
                    <h5 class="fw-bold mb-2">
                        {{event.title}}
                    </h5>
                    <p class="text-secondary small flex-grow-1">
                        "{{event.quote}}"
                    </p>
                    <div
                        class="d-flex justify-content-between align-items-center mt-3">
                        <span
                            class="badge rounded-pill bg-primary-subtle text-primary px-3 py-2">
                            <i class="bi bi-images me-1"></i>
                            {{event.totalPhotos}} Photos
                        </span>
                    </div>
                    <button
                        class="btn btn-primary rounded-pill mt-3"
                        (click)="openGallery(event)">
                        <i class="bi bi-images me-2"></i>
                        View Gallery
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
