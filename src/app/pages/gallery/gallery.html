<div class="container-fluid py-4">

    <!-- ================= HEADER ================= -->

    <div class="card border-0 shadow-sm rounded-4 mb-4">

        <div class="card-body">

            <h2 class="fw-bold mb-1">
                Institution Gallery
            </h2>

            <p class="text-secondary mb-0">
                Browse all institution events and memories
            </p>

        </div>

    </div>

    <!-- ================= GALLERY ================= -->

    <div class="row g-4">

        <div
            class="col-xl-3 col-lg-4 col-md-6"
            *ngFor="let event of galleryEvents">

            <div
                class="card border-0 shadow-sm rounded-4 overflow-hidden h-100 hover-card-lift cursor-pointer"
                (click)="openGallery(event)">

                <!-- IMAGE -->

                <div class="position-relative">

                    <img
                        [src]="event.thumbnail"
                        class="card-img-top"
                        style="height:220px;object-fit:cover;">

                    <!-- EDIT -->

                    <button
                        class="btn btn-light rounded-circle shadow-sm position-absolute top-0 end-0 m-2"
                        (click)="editEvent(event); $event.stopPropagation()">

                        <i class="bi bi-pencil-fill"></i>

                    </button>

                </div>

                <!-- BODY -->

                <div class="card-body d-flex flex-column">

                    <h5 class="fw-bold">
                        {{ event.title }}
                    </h5>

                    <p class="text-secondary small flex-grow-1">
                        "{{ event.quote }}"
                    </p>

                    <span
                        class="badge bg-info position-absolute end-0"
                        style="top:190px;margin-right:10px;">

                        <i class="bi bi-images me-1"></i>

                        {{ event.totalPhotos }}

                    </span>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- ================= FLOATING ADD BUTTON ================= -->

<button
    class="btn btn-success rounded-circle shadow-lg position-fixed"
    style="width:65px;height:65px;right:30px;bottom:30px;z-index:1055;"
    (click)="addNewEvent()">

    <i class="bi bi-plus-lg fs-2"></i>

</button>
