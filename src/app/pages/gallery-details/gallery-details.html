<div class="container-fluid py-4">

    <!-- ================= HEADER ================= -->

    <div class="card border-0 shadow-sm rounded-4 mb-4">

        <div class="card-body d-flex justify-content-between align-items-center">

            <!---- Left ---->

            <div class="d-flex align-items-center gap-3">

                <!---- Back ---->

                <div class="position-fixed d-flex align-items-center"
                     style="top:40px;left:260px;z-index:1050;">

                    <button
                        class="btn btn-light rounded-circle shadow-sm"
                        style="width:48px;height:48px;"
                        (click)="back()">
                        <i class="bi bi-arrow-left fs-5"></i>
                    </button>

                </div>

                <div>

                    <h2 class="fw-bold mb-1">

                        {{selectedEvent.title}}

                    </h2>

                    <p class="text-secondary mb-0">

                        "{{selectedEvent.quote}}"

                    </p>

                </div>

            </div>

            <!---- Right ---->

            <div class="d-flex align-items-center gap-3">

                <!---- Total Photos ---->

                <div
                    class="d-flex align-items-center bg-primary bg-opacity-10 px-3 py-2 rounded-pill">

                    <i class="bi bi-images text-primary me-2"></i>

                    <span class="fw-semibold">

                        {{selectedEvent.totalPhotos}} Photos

                    </span>

                </div>

                <!---- Chief Guests ---->

                <div
                    class="d-flex align-items-center bg-warning bg-opacity-10 px-3 py-2 rounded-pill">

                    <i class="bi bi-person-badge text-warning me-2"></i>

                    <span class="fw-semibold">

                        {{selectedEvent.chiefGuests.length}} Chief Guests

                    </span>

                </div>

            </div>

        </div>

    </div>

    <!-- ================= GALLERY ================= -->

    <div class="row g-4">

        <div
            class="col-xl-3 col-lg-4 col-md-6 col-sm-6"
            *ngFor="let item of galleryItems; let i=index">

            <div
                class="card border-0 shadow-sm rounded-4 overflow-hidden gallery-card">

                <div
                    class="position-relative"
                    (click)="openPreview(i)"
                    style="cursor:pointer;">

                    <img
                        [src]="item.image"
                        class="card-img-top"
                        style="height:260px;object-fit:cover;">

                    <!---- Chief Guest ---->

                    <span
                        *ngIf="item.type=='guest'"
                        class="badge bg-warning text-dark position-absolute top-0 start-0 m-2">

                        <i class="bi bi-star-fill me-1"></i>

                        Chief Guest

                    </span>

                </div>

            </div>

        </div>

    </div>

    <!-- EMPTY -->

    <div
        *ngIf="galleryItems.length===0"
        class="text-center py-5">

        <i class="bi bi-images display-2 text-secondary"></i>

        <h3 class="fw-bold mt-3">

            No Gallery Images

        </h3>

        <p class="text-secondary">
            Upload gallery images to display them here.
        </p>
    </div>
</div>
<!-- ================= LIGHTBOX ================= -->

<div
    *ngIf="isLightboxOpen"
    class="position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center"
    style="background:rgba(0,0,0,.92);z-index:9999;"
    (click)="closePreview()">

    <img
        [src]="activeImage"
        class="img-fluid rounded shadow-lg"
        style="max-width:90%;max-height:90%;object-fit:contain;"
        (click)="$event.stopPropagation()">

</div>
