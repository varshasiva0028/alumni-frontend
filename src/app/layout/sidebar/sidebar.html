<!-- Fixed sidebar wrapper with 240px width limit -->
<div class="position-fixed top-0 start-0 vh-100 bg-white border-end shadow d-flex flex-column p-3"
  style="width: 240px; z-index: 1030;">

  <!-- Logo Section -->
  <div class="text-center my-3">
    <div
      class="mx-auto mb-2 d-flex align-items-center justify-content-center bg-success bg-gradient text-white rounded-3 shadow-sm"
      style="width: 48px; height: 48px; font-size: 20px;">
      <i class="bi bi-shield-lock-fill"></i>
    </div>
    <span class="fw-bold tracking-wider text-success small">ADMIN PORTAL</span>
  </div>

  <hr class="text-muted opacity-25 my-2">

  <!-- Navigation -->
  <nav class="nav flex-column gap-2 flex-grow-1">

    <!-- Dashboard -->
    <a routerLink="/dashboard" routerLinkActive="bg-success text-white" [routerLinkActiveOptions]="{ exact: true }"
      class="nav-link text-start d-flex align-items-center gap-3 px-3 py-2 rounded-3 fw-semibold text-secondary">
      <i class="bi bi-grid-fill fs-5"></i>
      <span>Dashboard</span>
    </a>

    <!-- Admission -->
    <a routerLink="/admission" routerLinkActive="bg-success text-white"
      class="nav-link text-start d-flex align-items-center gap-3 px-3 py-2 rounded-3 fw-semibold text-secondary">
      <i class="bi bi-person-plus-fill fs-5"></i>
      <span>Admission</span>
    </a>

    <!-- Events -->
    <a routerLink="/gallery" routerLinkActive="bg-success text-white"
      class="nav-link text-start d-flex align-items-center gap-3 px-3 py-2 rounded-3 fw-semibold text-secondary">

      <i class="bi bi-images"></i>

      <span>Gallery</span>

    </a>

    <!-- Teachers -->
    <a routerLink="/staff" routerLinkActive="bg-success text-white"
      class="nav-link text-start d-flex align-items-center gap-3 px-3 py-2 rounded-3 fw-semibold text-secondary">
      <i class="bi bi-person-workspace fs-5"></i>
      <span>Staff</span>
    </a>

    <!-- Alumni -->
    <a routerLink="/alumni" routerLinkActive="bg-success text-white"
      class="nav-link text-start d-flex align-items-center gap-3 px-3 py-2 rounded-3 fw-semibold text-secondary">
      <i class="bi bi-mortarboard-fill fs-5"></i>
      <span>Alumni</span>
    </a>

    <!-- Results -->
    <a routerLink="/results" routerLinkActive="bg-success text-white"
      class="nav-link text-start d-flex align-items-center gap-3 px-3 py-2 rounded-3 fw-semibold text-secondary">
      <i class="bi bi-file-earmark-bar-graph-fill fs-5"></i>
      <span>Results</span>
    </a>

  </nav>

  <!-- Logout Action using Bootstrap Button Utilities -->
  <div class="mt-auto">
    <hr class="text-muted opacity-25 my-3">
    <button
      class="btn btn-outline-danger text-start border-0 d-flex align-items-center gap-3 px-3 py-2 rounded-3 fw-semibold w-100">
      <i class="bi bi-box-arrow-right fs-5"></i>
      <span>Logout</span>
    </button>
  </div>
</div>
